<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

        <div class="grid">

    <section id="tracking" class="main-section">
        <h2>Відстеження замовлення</h2> 
        <div class="grid">
            <div class="card card-yellow">Час очікування</div> 
            <div class="card card-yellow">Геолокація доставщика</div>

<footer>
    <p>&copy; 2026 Сервіс доставки їжі</p>
